<svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#58a6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1f6feb;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="eg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3fb950;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#58a6ff;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 透明背景，浏览器会自动适配 -->

  <!-- 电池外壳 -->
  <rect x="6" y="10" width="18" height="12" rx="2" fill="url(#bg)" stroke="#58a6ff" stroke-width="1" />

  <!-- 电池正极 -->
  <rect x="24" y="13" width="2" height="6" rx="1" fill="url(#bg)" />

  <!-- 电量指示 -->
  <rect x="8" y="12" width="4" height="8" rx="1" fill="url(#eg)" opacity="0.9" />
  <rect x="13" y="12" width="4" height="8" rx="1" fill="url(#eg)" opacity="0.8" />
  <rect x="18" y="12" width="4" height="8" rx="1" fill="url(#eg)" opacity="0.7" />

  <!-- 闪电 -->
  <path d="M 16 12 L 14 16 L 16 16 L 15 20 L 18 15 L 16 15 Z" fill="#e6edf3" opacity="0.95" />
</svg>